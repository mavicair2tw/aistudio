name: Stock report scheduled deploy (TW/US only)

on:
  push:
    branches: [ main ]
    paths:
      - '.github/workflows/stock-report-pages.yml'
      - 'stock-report-site/public/**'
      - 'stock-report-site/data/**'
      - 'stock-report-site/scripts/**'
  schedule:
    # 台北時間平日 14:00 = UTC 平日 06:00
    - cron: '0 6 * * 1-5'
    # 台北時間平日＋週六 07:00 = UTC 23:00 (Sun-Fri)
    - cron: '0 23 * * 0-5'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r stock-report-site/requirements.txt

      - name: Generate TW and US latest data
        run: |
          python stock-report-site/scripts/update_report.py
          python stock-report-site/scripts/update_us_report.py

      - name: Build static site payload
        run: |
          mkdir -p dist/tw/data
          mkdir -p dist/us/data

          cp stock-report-site/public/tw.html dist/tw/index.html
          cp stock-report-site/data/latest.json dist/tw/data/latest.json

          cp stock-report-site/public/us.html dist/us/index.html
          cp stock-report-site/data/us_latest.json dist/us/data/us_latest.json

      - name: Deploy TW/US updates to openai-tw-site safely
        env:
          TARGET_REPO: mavicair2tw/openai-tw-site
          DEPLOY_KEY: ${{ secrets.OPENAI_TW_SITE_DEPLOY_KEY }}
        run: |
          set -euo pipefail

          if [ -z "$DEPLOY_KEY" ]; then
            echo "OPENAI_TW_SITE_DEPLOY_KEY is not set" >&2
            exit 1
          fi

          eval "$(ssh-agent -s)"
          ssh-add <(echo "$DEPLOY_KEY")
          mkdir -p ~/.ssh
          touch ~/.ssh/known_hosts
          ssh-keyscan -H github.com >> ~/.ssh/known_hosts

          git config --global user.name "openai-tw bot"
          git config --global user.email "deploy@openai-tw.com"

          rm -rf site-publish
          git clone git@github.com:$TARGET_REPO.git site-publish
          cd site-publish

          # Update only TW and US report files. Do not replace the whole site.
          mkdir -p tw/data us/data
          cp ../dist/tw/index.html tw/index.html
          cp ../dist/tw/data/latest.json tw/data/latest.json
          cp ../dist/us/index.html us/index.html
          cp ../dist/us/data/us_latest.json us/data/us_latest.json

          # Ensure protected/manual content remains untouched.
          test -f english/index.html
          test -f etf/index.html
          test -f 五子棋/index.html
          test -f ibelieve/index.html
          test -f srt/index.html
          test -f mp3player/index.html
          test -f assets/P1.mp3
          test -f assets/P2.mp3

          git add tw/index.html tw/data/latest.json us/index.html us/data/us_latest.json
          git commit -m "Deploy TW/US reports $(date -u +%Y-%m-%dT%H:%M:%SZ)" || exit 0
          git push origin main
